<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" font-family="sans-serif">
  <rect width="320" height="200" fill="#f9f9f9" rx="10"/>
  <!-- Central node -->
  <circle cx="160" cy="100" r="22" fill="#2c2c54" stroke="#7c7cdc" stroke-width="2"/>
  <text x="160" y="105" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">BAI</text>
  <!-- Agent nodes -->
  <circle cx="60"  cy="55"  r="16" fill="#5b8dd9" stroke="#3a5fa0" stroke-width="1.5"/>
  <text x="60"  y="59"  text-anchor="middle" font-size="9" fill="#fff">A1</text>
  <circle cx="260" cy="55"  r="16" fill="#5b8dd9" stroke="#3a5fa0" stroke-width="1.5"/>
  <text x="260" y="59"  text-anchor="middle" font-size="9" fill="#fff">A2</text>
  <circle cx="60"  cy="150" r="16" fill="#5b8dd9" stroke="#3a5fa0" stroke-width="1.5"/>
  <text x="60"  y="154" text-anchor="middle" font-size="9" fill="#fff">A3</text>
  <circle cx="260" cy="150" r="16" fill="#5b8dd9" stroke="#3a5fa0" stroke-width="1.5"/>
  <text x="260" y="154" text-anchor="middle" font-size="9" fill="#fff">A4</text>
  <circle cx="160" cy="28"  r="16" fill="#e05c5c" stroke="#a03a3a" stroke-width="1.5"/>
  <text x="160" y="32"  text-anchor="middle" font-size="9" fill="#fff">Best</text>
  <!-- Edges -->
  <line x1="76"  y1="63"  x2="142" y2="88"  stroke="#7c7cdc" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="244" y1="63"  x2="178" y2="88"  stroke="#7c7cdc" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="76"  y1="142" x2="142" y2="112" stroke="#7c7cdc" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="244" y1="142" x2="178" y2="112" stroke="#7c7cdc" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="160" y1="44"  x2="160" y2="78"  stroke="#e05c5c" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- Agent-to-agent edges -->
  <line x1="76" y1="55" x2="244" y2="55" stroke="#4aaa6e" stroke-width="1" stroke-dasharray="3,4" opacity="0.6"/>
  <line x1="60" y1="71" x2="60" y2="134" stroke="#4aaa6e" stroke-width="1" stroke-dasharray="3,4" opacity="0.6"/>
  <!-- Label -->
  <text x="160" y="185" text-anchor="middle" font-size="10" fill="#555">Federated Decentralized Network</text>
</svg>
