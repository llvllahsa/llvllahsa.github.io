<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200" font-family="sans-serif">

  <!-- Background -->
  <rect width="320" height="200" fill="#f9f9f9" rx="10"/>

  <!-- ── Human figure (left) ── -->
  <!-- Head -->
  <circle cx="60" cy="55" r="22" fill="#f4c78a" stroke="#c8894a" stroke-width="1.5"/>
  <!-- Eyes -->
  <circle cx="53" cy="52" r="3" fill="#555"/>
  <circle cx="67" cy="52" r="3" fill="#555"/>
  <!-- Smile -->
  <path d="M53 63 Q60 70 67 63" stroke="#555" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Body -->
  <rect x="42" y="80" width="36" height="48" rx="6" fill="#5b8dd9"/>
  <!-- Arms -->
  <line x1="42" y1="88" x2="20" y2="112" stroke="#5b8dd9" stroke-width="8" stroke-linecap="round"/>
  <line x1="78" y1="88" x2="100" y2="108" stroke="#5b8dd9" stroke-width="8" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="52" y1="128" x2="46" y2="158" stroke="#3a3a6a" stroke-width="8" stroke-linecap="round"/>
  <line x1="68" y1="128" x2="74" y2="158" stroke="#3a3a6a" stroke-width="8" stroke-linecap="round"/>
  <!-- Label -->
  <text x="60" y="178" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">Human</text>
  <text x="60" y="191" text-anchor="middle" font-size="9" fill="#666">Bounded-Rational</text>

  <!-- ── Feedback arrow: Human → Agent ── -->
  <path d="M105 105 Q160 75 215 105" stroke="#e05c5c" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowRed)"/>
  <text x="160" y="82" text-anchor="middle" font-size="10" fill="#e05c5c">feedback</text>

  <!-- ── Agent learns arrow: Agent → Human ── -->
  <path d="M215 120 Q160 148 105 120" stroke="#4aaa6e" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowGreen)"/>
  <text x="160" y="148" text-anchor="middle" font-size="10" fill="#4aaa6e">query</text>

  <!-- ── RL Agent (right) — robot/brain icon ── -->
  <!-- Head/body box -->
  <rect x="218" y="38" width="64" height="64" rx="8" fill="#2c2c54" stroke="#7c7cdc" stroke-width="2"/>
  <!-- Eye visor -->
  <rect x="228" y="54" width="44" height="14" rx="4" fill="#00d4ff" opacity="0.85"/>
  <!-- Antenna -->
  <line x1="250" y1="38" x2="250" y2="24" stroke="#7c7cdc" stroke-width="2"/>
  <circle cx="250" cy="21" r="4" fill="#e05c5c"/>
  <!-- Mouth grid -->
  <line x1="228" y1="80" x2="272" y2="80" stroke="#7c7cdc" stroke-width="1"/>
  <line x1="240" y1="74" x2="240" y2="90" stroke="#7c7cdc" stroke-width="1"/>
  <line x1="250" y1="74" x2="250" y2="90" stroke="#7c7cdc" stroke-width="1"/>
  <line x1="260" y1="74" x2="260" y2="90" stroke="#7c7cdc" stroke-width="1"/>
  <!-- Legs -->
  <line x1="238" y1="102" x2="232" y2="130" stroke="#2c2c54" stroke-width="8" stroke-linecap="round"/>
  <line x1="262" y1="102" x2="268" y2="130" stroke="#2c2c54" stroke-width="8" stroke-linecap="round"/>
  <!-- Label -->
  <text x="250" y="150" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">RL Agent</text>
  <text x="250" y="163" text-anchor="middle" font-size="9" fill="#666">(UCRL)</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e05c5c"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4aaa6e"/>
    </marker>
  </defs>

</svg>
